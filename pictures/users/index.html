<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="../../favicon.png">
		<title>Users Image</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/hiepdeep/cdn/style.min.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<style type="text/css">
			body {
				background: var(--light);
				font-family: "Google Sans", sans-serif;
				padding: 1rem;
			}

			.box {
				display: grid;
				grid-gap: 1rem;
				grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
				background: #FFF;
				padding: 1rem;
			}

			.box .item .thumb svg image {
				width: 100%;
			}

			.box .item .metadata {
				font-size: 14px;
				font-weight: 500;
				line-height: 20px;
				padding: 1rem 0 0;
				text-align: center;
				user-select: none;
				cursor: pointer;
			}

			.box .item .metadata .name {
				color: var(--black-rgb-54);
			}

			.box .item .metadata .uname {
				color: var(--black-rgb-38);
			}
		</style>
	</head>
	<body>
