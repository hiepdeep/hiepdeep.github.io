<!DOCTYPE html>
<html lang="vn">
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1.0" name="viewport">
		<link rel="icon" href="favicon.ico">
		<title>CSS Custom Editor</title>
		<link rel="stylesheet" href="https://hiepdeep.github.io/library/style/style.css">
		<link rel="stylesheet" href="index.css">
	</head>
	<body>
		<div class="box">
			<div class="topbar">
				<input class="url-input" type="text" placeholder="https//..." id="reference-path">
				<div class="btn-gr">
					<button id="save" btn-blue>Save</button>
					<button id="delete" btn-red>Delete</button>
				</div>
			</div>
			<div class="editor-label">CSS Editor:</div>
			<div class="editor-wrap">
				<div class="line-numbers" id="lineNums"></div>
				<div class="code-area">
					<div id="hl" aria-hidden="true"></div>
					<textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" placeholder="/* Nhập CSS tại đây... */"></textarea>
				</div>
			</div>
		</div>
		<script src="index.js"></script>
	</body>
</html>
