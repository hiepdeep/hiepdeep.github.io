<!DOCTYPE html>
<html lang="vn">
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1.0" name="viewport">
		<link rel="icon" href="https://hiepdeep.github.io/library/favicon/logo-light.ico">
		<title>CSS Custom Editor</title>
		<link rel="stylesheet" href="https://hiepdeep.github.io/library/style/style.css">
		<link rel="stylesheet" href="index.css">
	</head>
	<body>
		<div class="box">
			<div class="header">
				<div class="input">
					<input type="text" placeholder="https//..." id="reference-path">
				</div>
				<div class="btn-gr">
					<button id="save" btn-blue>Save</button>
					<button id="delete" btn-light-red>Delete</button>
				</div>
			</div>
			<div class="editor-box">
				<label for="css-editor">CSS Editor:</label>
				<textarea id="css-editor" spellcheck="false" placeholder="/* Nhập CSS tại đây... */"></textarea>
			</div>
		</div>
		<script src="index.js"></script>
	</body>
</html>
