<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="/cdn/favicon/favicon.svg">
		<title>Chính Trị - Đề Cương</title>
		<link rel="stylesheet" href="/cdn/style.css">
		<style type="text/css">
			:root {
				--hover: #ffffff;
				--clr: #919297;
				--bg: #161824;
			}

			body {
				background: var(--bg);
				font-family: "Be Vietnam Pro", sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
			}

			.mdBjXNe {
				background: rgba(255, 255, 255, 0.05);
				position: relative;
				overflow: hidden;
				box-shadow: 0 0 0 4px var(--clr) inset;
				display: flex;
				justify-content: center;
				align-items: center;
				color: var(--clr);
				font-size: 14px;
				font-weight: 500;
				letter-spacing: 0.04em;
				padding: 24px;
			}

			.mdBjXNe:before,
			.mdBjXNe:after {
				content: "";
				position: absolute;
				background: var(--clr);
				width: 48px;
				height: 48px;
				transform: rotate(45deg);
				z-index: 999;
				border: 4px solid var(--bg);
				box-shadow: 0 0 0 4px var(--clr);
			}

			.mdBjXNe:before {
				top: calc(-36px - 4px);
				left: calc(-36px - 4px);
			}

			.mdBjXNe:after {
				right: calc(-36px - 4px);
				bottom: calc(-36px - 4px);
			}

			.mdBjXNe:hover {
				box-shadow: 0 0 0 4px var(--hover) inset;
				color: var(--hover);
			}

			.mdBjXNe:hover:before,
			.mdBjXNe:hover:after {
				background: var(--hover);
				box-shadow: 0 0 0 4px var(--hover);
			}
		</style>
	</head>
	<body>
		<a class="mdBjXNe" href="https://drive.google.com/drive/folders/1hqYviYiWLomFORi3pt5_laZkbF2pRXFf?usp=sharing" target="_blank">chinhtri.pdf</a>
	</body>
</html>
