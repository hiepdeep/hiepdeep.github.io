<!DOCTYPE html>
<html lang="vn">
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="https://hiepdeep.github.io/library/favicon/logo-light.ico">
		<title>Task Check</title>
		<link rel="stylesheet" href="https://hiepdeep.github.io/library/style/all.css">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="form">
			<form action="" id="form">
				<div class="gr-checkbox">
					<label for="half-morning">
						<input type="checkbox" name="half-morning" id="half-morning" value="4">
						<span class="name">Nghỉ buổi sáng</span>
					</label>
					<label for="half-afternoon">
						<input type="checkbox" name="half-afternoon" id="half-afternoon" value="4">
						<span class="name">Nghỉ buổi chiều</span>
					</label>
					<label for="overtime150">
						<input type="checkbox" name="overtime150" id="overtime150" value="3">
						<span class="name">Tăng ca thường</span>
					</label>
					<label for="overtime200">
						<input type="checkbox" name="overtime200" id="overtime200" value="11">
						<span class="name">Tăng ca Chủ nhật</span>
					</label>
				</div>
				<button type="submit">Chấm công hôm nay</button>
			</form>
		</div>
		<div class="calendar">
			<div class="cal-head">
				<button id="prev" class="material-symbols-rounded">chevron_backward</button>
				<h3 class="title"></h3>
				<button id="next" class="material-symbols-rounded">chevron_forward</button>
			</div>
			<div class="cal-body">
				<ul class="days">
					<li>Sun</li>
					<li>Mon</li>
					<li>Tue</li>
					<li>Wed</li>
					<li>Thu</li>
					<li>Fri</li>
					<li>Sat</li>
				</ul>
				<ul class="dates"></ul>
			</div>
		</div>
		<script src="script.js"></script>
	</body>
</html>
