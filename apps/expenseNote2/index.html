<!DOCTYPE html>
<html lang="vn">
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1.0" name="viewport">
		<link rel="icon" href="https://hiepdeep.github.io/library/favicon/report.ico">
		<title>Sổ Chi Tiêu</title>
		<link rel="stylesheet" href="https://hiepdeep.github.io/library/style/all.css">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="box">
			<div class="side sideleft active" id="sideleft">
				<div class="a">
					<div class="logo">
						<a href="">
							<img src="https://hiepdeep.github.io/library/pictures/svg/expense-book.svg" alt="">
							<span class="text">Sổ Chi Tiêu Cá Nhân</span>
						</a>
					</div>
				</div>
				<div class="b">
					<form action="" id="form">
						<div class="gr-label">
							<label for="hieu">
								<input type="radio" name="form-person" id="hieu" value="hieu">
								<span class="name">Hiếu</span>
							</label>
							<label for="hiep">
								<input type="radio" name="form-person" id="hiep" value="hiep" checked="">
								<span class="name">Hiệp</span>
							</label>
						</div>
						<input type="text" name="form-description" placeholder="Mô tả">
						<input type="tel" name="form-amount" placeholder="Số tiền" pattern="[0-9.]*">
						<div class="gr-label">
							<label for="form-expense">
								<input type="radio" name="form-type" id="form-expense" value="expense" checked="">
								<span class="name">chi tiêu</span>
							</label>
							<label for="form-borrow">
								<input type="radio" name="form-type" id="form-borrow" value="borrow">
								<span class="name">cho vay</span>
							</label>
						</div>
						<button type="submit">Tạo mới</button>
					</form>
				</div>
				<button class="material-symbols-rounded" id="close-sideleft">arrow_back</button>
			</div>
			<div class="side sideright" id="sideright">
				<div class="item return-chart" id="return-chart">
					<canvas id="chart-view"></canvas>
				</div>
				<div class="item return-data">
					<div class="title">
						<h3>Tổng chi gần đây của <b>Hiếu</b>:</h3>
						<span id="total-expense-hieu">0</span>
					</div>
					<div class="lists-data" id="lists-expense-hieu">
						<div class="loading"></div>
					</div>
				</div>
				<div class="item return-data">
					<div class="title">
						<h3>Tổng chi gần đây của <b>Hiệp</b>:</h3>
						<span id="total-expense-hiep">0</span>
					</div>
					<div class="lists-data" id="lists-expense-hiep">
						<div class="loading"></div>
					</div>
				</div>
				<div class="item return-data">
					<div class="title">
						<h3><b>Hiệp</b> vay mượn của <b>Hiếu</b>:</h3>
						<span id="total-borrow-hieu">0</span>
					</div>
					<div class="lists-data" id="lists-borrow-hieu">
						<div class="loading"></div>
					</div>
				</div>
				<div class="item return-data">
					<div class="title">
						<h3><b>Hiếu</b> vay mượn của <b>Hiệp</b>:</h3>
						<span id="total-borrow-hiep">0</span>
					</div>
					<div class="lists-data" id="lists-borrow-hiep">
						<div class="loading"></div>
					</div>
				</div>
				<div class="item return-data">
					<div class="title">
						<h3><b>Hiếu</b> cần trả <b>Hiệp</b>:</h3>
						<span id="hieu-tra-hiep">0</span>
					</div>
				</div>
				<div class="item return-data">
					<div class="title">
						<h3><b>Hiệp</b> cần trả <b>Hiếu</b>:</h3>
						<span id="hiep-tra-hieu">0</span>
					</div>
				</div>
			</div>
		</div>
		<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
		<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
		<script src='https://hiepdeep.github.io/library/script/function/functions.js'></script>
		<script src="script.js"></script>
	</body>
</html>
