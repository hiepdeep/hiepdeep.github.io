	<body>
		<div class="box">
			<div class="my-header">
				<a href="">Generator CAD AOi Holly - Panasonic</a>
				<div class="navigation-bar">
					<button class="btnImport active"><b>Mark</b></button>
					<span class="split">&gt;</span>
					<button class="btnImport">file <b>CSV</b></button>
					<span class="split">&gt;</span>
					<button id="btnExport">Generator</button>
				</div>
			</div>
			<div class="main">
				<div class="txtImport active">
					<div class="table">
						<table id="importMark">
							<tr>
								<th></th>
								<th>X</th>
								<th>Y</th>
							</tr>
							<tr>
								<th>Mark 1</th>
								<td><input type="tel" id="mark-X1" placeholder="0" pattern="[0-9.]*" required></td>
								<td><input type="tel" id="mark-Y1" placeholder="0" pattern="[0-9.]*" required></td>
							</tr>
							<tr>
								<th>Mark 2</th>
								<td><input type="tel" id="mark-X2" placeholder="0" pattern="[0-9.]*" required></td>
								<td><input type="tel" id="mark-Y2" placeholder="0" pattern="[0-9.]*" required></td>
							</tr>
						</table>
					</div>
				</div>
				<div class="txtImport">
					<label class="addCSV" for="addCSV">
						<input type="file" id="addCSV" accept="text/csv" data-title="Drag and drop a file" hidden="hidden">
						<span class="txt">Chọn file CSV đã lưu</span>
					</label>
					<textarea id="importCSV" placeholder="Pls add CSV.."></textarea>
				</div>
				<div class="txtExport" id="txtExport"></div>
			</div>
			<div class="my-footer">
				<div class="totals">
					<span><strong id="total-csv">0</strong></span>
					<span><strong id="total-cad">0</strong></span>
				</div>
				<span class="copyright">Created, maintained and evolved by <b>HiepDeep</b>.</span>
			</div>
		</div>
		<script type="text/javascript">
			console.clear();
			var btnImports = document.getElementsByClassName("btnImport");
			var txtImports = document.getElementsByClassName("txtImport");
			var btnExport = document.getElementById("btnExport");
			var txtExport = document.getElementById("txtExport");
			for (var i = 0; i < btnImports.length; i++) {
				(function(index) {
					btnImports[index].addEventListener("click", function(e) {
						e.preventDefault();
						for (var j = 0; j < btnImports.length; j++) {
							btnImports[j].classList.remove("active");
							txtImports[j].classList.remove("active");
						}
						btnExport.classList.remove("active");
						txtExport.classList.remove("active");
						btnImports[index].classList.add("active");
						txtImports[index].classList.add("active");
					});
				})(i);
			}
			document.getElementById("addCSV").addEventListener("change", function() {
				var file = this.files ? this.files[0] : null;
				if (!file) return;
				var reader = new FileReader();
				reader.onload = function(e) {
					var result = e.target.result.trim();
					var arr0 = [];
					var arr1 = [];
					var arr2 = [];
					var arr3 = [];
					var inputElement = document.getElementById("importCSV");
					var txtInput = result.split("\n");
					for (var x = 0; x < txtInput.length; x++) {
						arr0.push([]);
						var cells = txtInput[x].split(",");
						for (var xx = 0; xx < cells.length; xx++) {
							arr0[x].push(cells[xx].trim());
						}
					}
					if (arr0.length > 0 && arr0[0].length > 0) {
						for (var x = 0; x < arr0[0].length; x++) {
							arr1.push([]);
							arr2.push([]);
							arr3.push([]);
							for (var xx = 0; xx < arr0.length; xx++) {
								var cellValue = arr0[xx][x] || "";
								arr1[x].push(cellValue);
								arr2[x].push(cellValue.length);
							}
							arr3[x].push(Math.max.apply(null, arr2[x]));
							for (var u = 0; u < arr1[x].length; u++) {
								var uLength = arr1[x][u].length;
								var maxLength = arr3[x][0];
								if (uLength < maxLength) {
									for (var k = 0; k < (maxLength - uLength); k++) {
										arr1[x][u] += " ";
									}
								}
							}
						}
						var ee = "";
						for (var x = 0; x < arr1[0].length; x++) {
							for (var xx = 0; xx < arr1.length; xx++) {
								ee += arr1[xx][x];
								if (xx < arr1.length - 1) {
									ee += " | ";
								}
							}
							if (x < arr1[0].length - 1) {
								ee += "\n";
							}
						}
						inputElement.value = ee.trim();
						document.getElementById("total-csv").innerText = txtInput.length;
					}
				};
				reader.readAsText(file);
			});
			btnExport.addEventListener("click", function(e) {
				e.preventDefault();
				for (var j = 0; j < btnImports.length; j++) {
					btnImports[j].classList.remove("active");
					txtImports[j].classList.remove("active");
				}
				btnExport.classList.add("active");
				txtExport.classList.add("active");
				var data_CSV = document.getElementById("importCSV").value.trim();
				var row_CSV = [];
				var tempCSVRows = data_CSV.split("\n");
				for (var x = 0; x < tempCSVRows.length; x++) {
					row_CSV.push([]);
					var cells = tempCSVRows[x].split("|");
					for (var xx = 0; xx < cells.length; xx++) {
						row_CSV[x].push(cells[xx].trim());
					}
				}
				var csv_Board = row_CSV[0].indexOf("Pattern");
				var csv_Ref = row_CSV[0].indexOf("Designator");
				var csv_PosX = row_CSV[0].indexOf("X");
				var csv_PosY = row_CSV[0].indexOf("Y");
				var csv_Rotation = row_CSV[0].indexOf("Rotation");
				var csv_PartNumber = row_CSV[0].indexOf("Part Name");
				var csv_Head = row_CSV[0].indexOf("Head");
				var csv_Feeder = row_CSV[0].indexOf("Slot");
				var csv_Holder = row_CSV[0].indexOf("NHP");
				var csv_Nozzle = row_CSV[0].indexOf("Nozzle");
				// Generator CAD
				var sumCad = 0;
				var table = document.createElement("table");
				var headerRow = table.insertRow();
				var headers = ["Board", "Location Name", "X", "Y", "Angle", "Part Number", "Mouter", "Feeder", "Holder", "Nozzle"];
				for (var h = 0; h < headers.length; h++) {
					var th = document.createElement("th");
					th.textContent = headers[h];
					headerRow.appendChild(th);
				}
				var mark = [
					[
						document.getElementById("mark-X1").value.trim(),
						document.getElementById("mark-Y1").value.trim()
					],
					[
						document.getElementById("mark-X2").value.trim(),
						document.getElementById("mark-Y2").value.trim()
					]
				];
				for (var i = 0; i < 2; i++) {
					var row = table.insertRow();
					row.insertCell().textContent = "0";
					row.insertCell().textContent = "Mark" + (i + 1);
					row.insertCell().textContent = mark[i][0];
					row.insertCell().textContent = mark[i][1];
					row.insertCell().textContent = "0";
					row.insertCell().textContent = "Mark";
					row.insertCell().textContent = "0";
					row.insertCell().textContent = "0";
					row.insertCell().textContent = "0";
					row.insertCell().textContent = "0";
				}
				for (var i = 1; i < row_CSV.length; i++) {
					sumCad++;
					var machine = row_CSV[i][csv_Head] - Math.floor(row_CSV[i][csv_Head] / 2);
					var feeder = row_CSV[i][csv_Feeder].replace(/^.*0+/, "");
					var row = table.insertRow();
					row.insertCell().textContent = row_CSV[i][csv_Board];
					row.insertCell().textContent = row_CSV[i][csv_Ref];
					row.insertCell().textContent = row_CSV[i][csv_PosX];
					row.insertCell().textContent = row_CSV[i][csv_PosY];
					row.insertCell().textContent = row_CSV[i][csv_Rotation];
					row.insertCell().textContent = row_CSV[i][csv_PartNumber];
					row.insertCell().textContent = "M" + machine + "T" + row_CSV[i][csv_Head];
					row.insertCell().textContent = "F0" + feeder;
					row.insertCell().textContent = "H" + row_CSV[i][csv_Holder];
					row.insertCell().textContent = "N" + row_CSV[i][csv_Nozzle];
				}
				document.getElementById("txtExport").innerHTML = "";
				document.getElementById("txtExport").appendChild(table);
				document.getElementById("total-cad").innerText = sumCad;
			});
		</script>
	</body>
