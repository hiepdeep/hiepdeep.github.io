								color: hsl(var(--hue-saturation-gray), 95%);
								background: hsl(var(--hue-saturation-gray), 50%);
								border: 1px solid hsl(var(--hue-saturation-gray), 45%);
								border-radius: var(--bdrs-lv-4);
								&:hover {
									background: hsl(var(--hue-saturation-gray), 45%);
									border-color: hsl(var(--hue-saturation-gray), 40%);
								}
								&:active {
									background: hsl(var(--hue-saturation-gray), 40%);
									border-color: hsl(var(--hue-saturation-gray), 35%);
								}
							}
						}
						textarea {
							width: 100%;
							height: 100%;
							padding: 12px;
							font-family: "consolas";
							font-size: 11px;
							color: var(--color-lv-3);
							background: var(--bg-box);
							border: 1px solid var(--bd-box);
							border-radius: var(--bdrs-lv-4);
							resize: none;
							overflow-y: scroll;
						}
						&.active {
							display: flex;
							flex-direction: column;
							gap: 6px;
						}
					}
					.txtExport {
						display: none;
						height: 100%;
						padding: 6px;
						background: var(--bg-box);
						border: 1px solid var(--bd-box);
						border-radius: var(--bdrs-lv-4);
						overflow-y: scroll;
						table {
							border-collapse: collapse;
							width: 100%;
							user-select: all;
							tr {
								th, td {
									text-align: left;
									padding: 6px;
									color: var(--color-lv-3);
								}
								th {
									font-weight: 600;
									border-bottom: 1px solid var(--bd-box);
								}
								td {
									
								}
							}
						}
						&.active {
							display: block;
						}
					}
				}
				.my-footer {
					display: flex;
					justify-content: space-between;
					align-items: center;
					gap: 12px;
					.totals {
						span {
							color: var(--color-lv-4);
							strong {
								font-weight: 600;
								color: inherit;
							}
						}
					}
					.copyright {
						color: var(--color-lv-4);
						b {
							font-weight: 600;
							color: inherit;
						}
					}
				}
			}
		</style>
	</head>
	<body>
		<div class="box">
			<div class="my-header">
				<a href="">Generator CAD AOi Holly - Panasonic</a>
				<div class="navigation-bar">
					<button class="btnImport"><b>Mark</b></button>
					<span class="split">&gt;</span>
					<button class="btnImport active">file <b>CSV</b></button>
					<span class="split">&gt;</span>
					<button id="btnExport">Generator</button>
				</div>
			</div>
			<div class="main">
				<div class="txtImport">
					<div class="table">
						<table id="importMark">
							<tr>
								<th></th>
								<th>X</th>
								<th>Y</th>
							</tr>
							<tr>
								<th>Mark 1</th>
								<td><input type="tel" id="mark-X1" placeholder="0" pattern="[0-9.]*" required></td>
								<td><input type="tel" id="mark-Y1" placeholder="0" pattern="[0-9.]*" required></td>
							</tr>
							<tr>
								<th>Mark 2</th>
								<td><input type="tel" id="mark-X2" placeholder="0" pattern="[0-9.]*" required></td>
								<td><input type="tel" id="mark-Y2" placeholder="0" pattern="[0-9.]*" required></td>
							</tr>
						</table>
					</div>
				</div>
				<div class="txtImport active">
					<label class="addCSV" for="addCSV">
						<input type="file" id="addCSV" accept="text/csv" data-title="Drag and drop a file" hidden="hidden">
						<span class="txt">Chọn file CSV đã lưu</span>
					</label>
					<textarea id="importCSV" placeholder="Pls add CSV.."></textarea>
				</div>
				<div class="txtExport" id="txtExport"></div>
			</div>
			<div class="my-footer">
				<div class="totals">
					<span><strong id="total-place">0</strong></span>
					<span><strong id="total-cad">0</strong></span>
				</div>
				<span class="copyright">Created, maintained and evolved by <b>HiepDeep</b>.</span>
			</div>
		</div>
		<script type="text/javascript">
			console.clear();
			const btnImports = document.getElementsByClassName("btnImport");
			const txtImports = document.getElementsByClassName("txtImport");
			const btnExport = document.getElementById("btnExport");
			const txtExport = document.getElementById("txtExport");

			for (let i = 0; i < btnImports.length; i++) {
				btnImports[i].addEventListener("click", (e) => {
					e.preventDefault();
					for (let j = 0; j < btnImports.length; j++) {
						btnImports[j].classList.remove("active");
						txtImports[j].classList.remove("active");
					}
					btnExport.classList.remove("active");
					txtExport.classList.remove("active");
					btnImports[i].classList.add("active");
					txtImports[i].classList.add("active");
				});
			}
			document.getElementById("addCSV").addEventListener("change", function() {
				let file = this.files[0];
				if (!file) return;
				let allDataRows = [];
				let reader = new FileReader();
				reader.onload = function(e) {
					let result = e.target.result.trim();
					let arr0 = [];
					let arr1 = [];
					let arr2 = [];
					let arr3 = [];
					let inputElement = document.getElementById("importCSV");
					let txtInput = result.split("\n");
					for (let x = 0; x < txtInput.length; x++) {
						arr0.push([]);
						let cells = txtInput[x].split(",");
						for (let xx = 0; xx < cells.length; xx++) {
							arr0[x].push(cells[xx].trim());
						}
					}
					if (arr0.length > 0 && arr0[0].length > 0) {
						for (let x = 0; x < arr0[0].length; x++) {
							arr1.push([]);
							arr2.push([]);
							arr3.push([]);
							for (let xx = 0; xx < arr0.length; xx++) {
								let cellValue = arr0[xx][x] || "";
								arr1[x].push(cellValue);
								arr2[x].push(cellValue.length);
							}
							arr3[x].push(Math.max.apply(null, arr2[x]));
							for (let u = 0; u < arr1[x].length; u++) {
								let uLength = arr1[x][u].length;
								let maxLength = arr3[x][0];
								if (uLength < maxLength) {
									for (let k = 0; k < (maxLength - uLength); k++) {
										arr1[x][u] += " ";
									}
								}
							}
						}
						let ee = "";
						for (let x = 0; x < arr1[0].length; x++) {
							for (let xx = 0; xx < arr1.length; xx++) {
								ee += arr1[xx][x];
								if (xx < arr1.length - 1) {
									ee += " | ";
								}
							}
							if (x < arr1[0].length - 1) {
								ee += "\n";
							}
						}
						inputElement.value = ee.trim();
					}
				};
				reader.readAsText(file);
			});
			btnExport.addEventListener("click", (e) => {
				e.preventDefault();
				for (let j = 0; j < btnImports.length; j++) {
					btnImports[j].classList.remove("active");
					txtImports[j].classList.remove("active");
				}
				btnExport.classList.add("active");
				txtExport.classList.add("active");
				// Place
				let data_Place = document.getElementById("importCSV").value.trim();
				let row_Place = [];
				let tempPlaceRows = data_Place.split("\n");
				for (let x = 0; x < tempPlaceRows.length; x++) {
					row_Place.push([]);
					let cells = tempPlaceRows[x].split("|");
					for (let xx = 0; xx < cells.length; xx++) {
						row_Place[x].push(cells[xx].trim());
					}
				}
				let place_Board = row_Place[0].indexOf("Pattern");
				let place_Ref = row_Place[0].indexOf("Designator");
				let place_PosX = row_Place[0].indexOf("X");
				let place_PosY = row_Place[0].indexOf("Y");
				let place_Rotation = row_Place[0].indexOf("Rotation");
				let place_PartNumber = row_Place[0].indexOf("Part Name");
				let place_Head = row_Place[0].indexOf("Head");
				let place_Feeder = row_Place[0].indexOf("Slot");
				let place_Holder = row_Place[0].indexOf("NHP");
				let place_Nozzle = row_Place[0].indexOf("Nozzle");
				console.log( row_Place );
				// Generator CAD
				let sumCad = 0;
				let table = document.createElement("table");
				let headerRow = table.insertRow();
				let headers = ["Board", "Location Name", "X", "Y", "Angle", "Part Number", "Mouter", "Feeder", "Holder", "Nozzle"];
				headers.forEach(headerText => {
					let th = document.createElement("th");
					th.textContent = headerText;
					headerRow.appendChild(th);
				});
				for (let i = 1; i < row_Place.length; i++) {
					sumCad++;
					let row = table.insertRow();
					row.insertCell().textContent = row_Place[i][place_Board];
					row.insertCell().textContent = row_Place[i][place_Ref];
					row.insertCell().textContent = row_Place[i][place_PosX];
					row.insertCell().textContent = row_Place[i][place_PosY];
					row.insertCell().textContent = row_Place[i][place_Rotation];
					row.insertCell().textContent = row_Place[i][place_PartNumber];
					row.insertCell().textContent = "M" + row_Place[i][place_Head];
					row.insertCell().textContent = "F" + row_Place[i][place_Feeder];
					row.insertCell().textContent = "H" + row_Place[i][place_Holder];
					row.insertCell().textContent = "N" + row_Place[i][place_Nozzle];
				}
				document.getElementById("txtExport").innerHTML = "";
				document.getElementById("txtExport").appendChild(table);
				document.getElementById("total-cad").innerText = sumCad;
			});
		</script>
	</body>
</html>
