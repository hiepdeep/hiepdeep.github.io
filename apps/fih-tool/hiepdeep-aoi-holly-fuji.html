								border: 1px solid hsl(var(--hue-saturation-gray), 45%);
								border-radius: var(--bdrs-lv-4);
								&:hover {
									background: hsl(var(--hue-saturation-gray), 45%);
									border-color: hsl(var(--hue-saturation-gray), 40%);
								}
								&:active {
									background: hsl(var(--hue-saturation-gray), 40%);
									border-color: hsl(var(--hue-saturation-gray), 35%);
								}
							}
						}
						textarea {
							width: 100%;
							height: 100%;
							padding: 12px;
							font-family: "consolas";
							font-size: 11px;
							color: var(--color-lv-3);
							background: var(--bg-box);
							border: 1px solid var(--bd-box);
							border-radius: var(--bdrs-lv-4);
							resize: none;
							overflow-y: scroll;
						}
						&.active {
							display: flex;
							flex-direction: column;
							gap: 6px;
						}
					}
					.txtExport {
						display: none;
						height: 100%;
						padding: 6px;
						background: var(--bg-box);
						border: 1px solid var(--bd-box);
						border-radius: var(--bdrs-lv-4);
						overflow-y: scroll;
						table {
							border-collapse: collapse;
							width: 100%;
							user-select: all;
							tr {
								th, td {
									text-align: left;
									padding: 6px;
									color: var(--color-lv-3);
								}
								th {
									font-weight: 600;
									border-bottom: 1px solid var(--bd-box);
								}
								td {
									
								}
							}
						}
						&.active {
							display: block;
						}
					}
				}
				.my-footer {
					display: flex;
					justify-content: space-between;
					align-items: center;
					gap: 12px;
					.totals {
						span {
							color: var(--color-lv-4);
							strong {
								font-weight: 600;
								color: inherit;
							}
						}
					}
					.copyright {
						color: var(--color-lv-4);
						b {
							font-weight: 600;
							color: inherit;
						}
					}
				}
			}
		</style>
	</head>
	<body>
		<div class="box">
			<div class="my-header">
				<a href="">Generator CAD AOi Holly - Fuji</a>
				<div class="navigation-bar">
					<button class="btnImport active"><b>Mark</b></button>
					<span class="split">&gt;</span>
					<button class="btnImport"><b>PartReportUnit</b></button>
					<span class="split">&gt;</span>
					<button class="btnImport"><b>Place</b></button>
					<span class="split">&gt;</span>
					<button class="btnImport"><b>Insert Order</b> (Tuỳ chọn)</button>
					<span class="split">&gt;</span>
					<button id="btnExport">Generator</button>
				</div>
			</div>
			<div class="main">
				<div class="txtImport active">
					<textarea id="importMark" placeholder="Pls add Mark.."></textarea>
				</div>
				<div class="txtImport">
					<label class="addPartReportUnit" for="addPartReportUnit">
						<input type="file" id="addPartReportUnit" accept="text/xml" data-title="Drag and drop a file" hidden="hidden" multiple>
						<span class="txt">Chọn file PartReportUnit đã lưu</span>
					</label>
					<textarea id="importPartReportUnit" placeholder="Pls add PartReportUnit.."></textarea>
				</div>
				<div class="txtImport">
					<textarea id="importPlace" placeholder="Pls add Place.."></textarea>
				</div>
				<div class="txtImport">
					<textarea id="importInsertOrder" placeholder="Pls add InsertOrder.."></textarea>
				</div>
				<div class="txtExport" id="txtExport"></div>
			</div>
			<div class="my-footer">
				<div class="totals">
					<span><strong id="total-place">0</strong></span>
					<span><strong id="total-cad">0</strong></span>
				</div>
				<span class="copyright">Created, copyright, maintained and evolved by <b>HiepDeep</b>.</span>
			</div>
		</div>
		<script type="text/javascript">
			console.clear();
			const btnImports = document.getElementsByClassName("btnImport");
			const txtImports = document.getElementsByClassName("txtImport");
			const btnExport = document.getElementById("btnExport");
			const txtExport = document.getElementById("txtExport");
			for (let i = 0; i < btnImports.length; i++) {
				btnImports[i].addEventListener("click", (e) => {
					e.preventDefault();
					for (let j = 0; j < btnImports.length; j++) {
						btnImports[j].classList.remove("active");
						txtImports[j].classList.remove("active");
					}
					btnExport.classList.remove("active");
					txtExport.classList.remove("active");
					btnImports[i].classList.add("active");
					txtImports[i].classList.add("active");
				});
			}
			document.getElementById("importMark").addEventListener("input", (e) => {
				formatInput_1("importMark");
			});
			document.getElementById("addPartReportUnit").addEventListener("change", function() {
				let files = this.files;
				if (files.length === 0) return;
				let allDataRows = [];
				let filesRead = 0;
				let globalCounter = 1;
				function readIndividualFile(index) {
					if (index >= files.length) {
						formatInput_2("importPartReportUnit", allDataRows);
						return;
					}
					var reader = new FileReader();
					reader.onload = function(e) {
						var result = e.target.result.replace(/(\<\?)(.+)(\?\>)/gi, "").trim();
						var tempDiv = document.createElement("div");
						tempDiv.innerHTML = result;
						var xml_partreportunit = tempDiv.getElementsByTagName("partreportunit");
						var xml_unit = xml_partreportunit.length > 0 ? xml_partreportunit[0].getElementsByTagName("unit") : [];
						for (var i = 0; i < xml_unit.length; i++) {
							// Chỉ lấy tiêu đề ở file đầu tiên, các file sau bỏ qua dòng i=0
							if (index > 0 && i === 0) continue;
							var rowData = [];
							var children = xml_unit[i].children;
							for (var j = 0; j < children.length; j++) {
								var cellText = children[j].innerText.trim();
								if (j === 0 && cellText !== "seqInsOrder") {
									rowData.push(globalCounter.toString());
								} else {
									rowData.push(cellText);
								}
							}
							if (rowData[0] !== "seqInsOrder") {
								globalCounter++;
							}
							allDataRows.push(rowData);
						}
						readIndividualFile(index + 1);
					};
					reader.readAsText(files[index]);
				}
				function formatInput_2(elementId, arr0) {
					let arr1 = [];
					let arr2 = [];
					let arr3 = [];
					let inputElement = document.getElementById(elementId);
					inputElement.value = "";
					if (arr0.length > 0 && arr0[0].length > 0) {
						for (let x = 0; x < arr0[0].length; x++) {
							arr1.push([]);
							arr2.push([]);
							arr3.push([]);
							for (let xx = 0; xx < arr0.length; xx++) {
								let cellValue = arr0[xx][x] || "";
								arr1[x].push(cellValue);
								arr2[x].push(cellValue.length);
							}
							arr3[x].push(Math.max.apply(null, arr2[x]));
							for (let u = 0; u < arr1[x].length; u++) {
								let uLength = arr1[x][u].length;
								let maxLength = arr3[x][0];
								if (uLength < maxLength) {
									for (let k = 0; k < (maxLength - uLength); k++) {
										arr1[x][u] += " ";
									}
								}
							}
						}
						let ee = "";
						for (let x = 0; x < arr1[0].length; x++) {
							for (let xx = 0; xx < arr1.length; xx++) {
								ee += arr1[xx][x];
								if (xx < arr1.length - 1) {
									ee += " | ";
								}
							}
							if (x < arr1[0].length - 1) {
								ee += "\n";
							}
						}
						inputElement.value = ee.trim();
					} else {
						inputElement.value = "Lỗi: Không tìm thấy dữ liệu!";
					}
				}
				readIndividualFile(0);
			});
			document.getElementById("importPlace").addEventListener("input", (e) => {
				formatInput_1("importPlace");
				document.getElementById("total-place").innerText = e.target.value.trim().split("\n").length - 1;
			});
			document.getElementById("importInsertOrder").addEventListener("input", (e) => {
				formatInput_1("importInsertOrder");
			});
			btnExport.addEventListener("click", (e) => {
				e.preventDefault();
				for (let j = 0; j < btnImports.length; j++) {
					btnImports[j].classList.remove("active");
					txtImports[j].classList.remove("active");
				}
				btnExport.classList.add("active");
				txtExport.classList.add("active");
				// Mark
				let data_Mark = document.getElementById("importMark").value.trim();
				let row_Mark = [];
				let tempMarkRows = data_Mark.split("\n");
				for (let x = 0; x < tempMarkRows.length; x++) {
					row_Mark.push([]);
					let cells = tempMarkRows[x].split("|");
					for (let xx = 0; xx < cells.length; xx++) {
						row_Mark[x].push(cells[xx].trim());
					}
				}
				let mark_Block = row_Mark[0].indexOf("Board");
				let mark_LocationName = row_Mark[0].indexOf("Ref.");
				let mark_X = row_Mark[0].indexOf("Pos X");
				let mark_Y = row_Mark[0].indexOf("Pos Y");
				let arr_Mark = [["Block", "Location Name", "X", "Y"]];
				for (let row = 1; row < row_Mark.length; row++) {
					arr_Mark.push([]);
					let newRowIndex = arr_Mark.length - 1;
					arr_Mark[newRowIndex].push(row_Mark[row][mark_Block].trim());
					arr_Mark[newRowIndex].push(row_Mark[row][mark_LocationName].trim());
					arr_Mark[newRowIndex].push(row_Mark[row][mark_X].trim());
					arr_Mark[newRowIndex].push(row_Mark[row][mark_Y].trim());
				}
				// PartReportUnit
				let data_PartReportUnit = document.getElementById("importPartReportUnit").value.trim();
				let row_PartReportUnit = [];
				let tempPartReportUnitRows = data_PartReportUnit.split("\n");
				for (let x = 0; x < tempPartReportUnitRows.length; x++) {
					row_PartReportUnit.push([]);
					let cells = tempPartReportUnitRows[x].split("|");
					for (let xx = 0; xx < cells.length; xx++) {
						row_PartReportUnit[x].push(cells[xx].trim());
					}
				}
				let unit_seqBrdNum = row_PartReportUnit[0].indexOf("seqBrdNum");
				let unit_seqRef = row_PartReportUnit[0].indexOf("seqRef");
				let unit_seqPartNum = row_PartReportUnit[0].indexOf("seqPartNum");
				let unit_fsSetPos = row_PartReportUnit[0].indexOf("fsSetPos");
				let arr_PartReportUnit = [["Board", "Ref.", "Part Number", "Mounter", "Feeder", "BoardRef"]];
				for (let row = 1; row < row_PartReportUnit.length; row++) {
					arr_PartReportUnit.push([]);
					let newRowIndex = arr_PartReportUnit.length - 1;
					let brdNum = row_PartReportUnit[row][unit_seqBrdNum].trim();
					let ref = row_PartReportUnit[row][unit_seqRef].trim();
					arr_PartReportUnit[newRowIndex].push(brdNum);
					arr_PartReportUnit[newRowIndex].push(ref);
					arr_PartReportUnit[newRowIndex].push(row_PartReportUnit[row][unit_seqPartNum].trim());
					arr_PartReportUnit[newRowIndex].push(row_PartReportUnit[row][unit_fsSetPos].split("-")[0].trim());
					arr_PartReportUnit[newRowIndex].push(row_PartReportUnit[row][unit_fsSetPos].split("-")[1].trim());
					arr_PartReportUnit[newRowIndex].push(brdNum + ref);
				}
				// Place
				let data_Place = document.getElementById("importPlace").value.trim();
				let row_Place = [];
				let tempPlaceRows = data_Place.split("\n");
				for (let x = 0; x < tempPlaceRows.length; x++) {
					row_Place.push([]);
					let cells = tempPlaceRows[x].split("|");
					for (let xx = 0; xx < cells.length; xx++) {
						row_Place[x].push(cells[xx].trim());
					}
				}
				let place_Board = row_Place[0].indexOf("Board");
				let place_Ref = row_Place[0].indexOf("Ref.");
				let place_PosX = row_Place[0].indexOf("Pos X");
				let place_PosY = row_Place[0].indexOf("Pos Y");
				let place_Rotation = row_Place[0].indexOf("Rotation");
				let place_PartNumber = row_Place[0].indexOf("Part Number");
				let arr_Place = [["Board", "Ref.", "Pos X", "Pos Y", "Rotation", "Part Number", "BoardRef"]];
				for (let row = 1; row < row_Place.length; row++) {
					arr_Place.push([]);
					let newRowIndex = arr_Place.length - 1;
					let brdNum = row_Place[row][place_Board].trim();
					let ref = row_Place[row][place_Ref].trim();
					arr_Place[newRowIndex].push(brdNum);
					arr_Place[newRowIndex].push(ref);
					arr_Place[newRowIndex].push(row_Place[row][place_PosX].trim());
					arr_Place[newRowIndex].push(row_Place[row][place_PosY].trim());
					arr_Place[newRowIndex].push(row_Place[row][place_Rotation].trim());
					arr_Place[newRowIndex].push(row_Place[row][place_PartNumber].trim());
					arr_Place[newRowIndex].push(brdNum + ref);
				}
				// InsertOrder
				let data_InsertOrder = document.getElementById("importInsertOrder").value.trim();
				let hasInsertOrderData = data_InsertOrder.length > 0;
				let arr_InsertOrder = [["Reference", "Holder"]];
				if (hasInsertOrderData) {
					let row_InsertOrder = [];
					let tempInsertOrderRows = data_InsertOrder.split("\n");
					for (let x = 0; x < tempInsertOrderRows.length; x++) {
						row_InsertOrder.push([]);
						let cells = tempInsertOrderRows[x].split("|");
						for (let xx = 0; xx < cells.length; xx++) {
							row_InsertOrder[x].push(cells[xx].trim());
						}
					}
					let order_Reference = null;
					let order_Holder = null;
					if (row_InsertOrder.length > 0 && row_InsertOrder[0].length > 0) {
						order_Reference = row_InsertOrder[0].indexOf("Reference");
						order_Holder = row_InsertOrder[0].indexOf("Holder Number");
					} else {
						order_Reference = -1;
						order_Holder = -1;
					}
					for (var row = 1; row < row_InsertOrder.length; row++) {
						if (row_InsertOrder[row].length > order_Reference && row_InsertOrder[row].length > order_Holder && order_Reference !== -1 && order_Holder !== -1) {
							arr_InsertOrder.push([]);
							var newRowIndex = arr_InsertOrder.length - 1;
							arr_InsertOrder[newRowIndex].push(row_InsertOrder[row][order_Reference].trim());
							arr_InsertOrder[newRowIndex].push(row_InsertOrder[row][order_Holder].trim());
						}
					}
				}
				// Generator CAD
				let table = document.createElement("table");
				let headerRow = table.insertRow();
				let headers = ["Board", "Location Name", "X", "Y", "Angle", "Part Number", "Mouter", "Feeder"];
				if (hasInsertOrderData) {
					headers.push("Holder");
				}
				headers.forEach(headerText => {
					let th = document.createElement("th");
					th.textContent = headerText;
					headerRow.appendChild(th);
				});
				for (let tr_Mark = 1; tr_Mark < arr_Mark.length; tr_Mark++) {
					if (arr_Mark[tr_Mark][0] == "0") {
						let locationName = arr_Mark[tr_Mark][1];
						let lastChar = locationName.charAt(locationName.length - 1);
						let row = table.insertRow();
						row.insertCell().textContent = arr_Mark[tr_Mark][0];
						row.insertCell().textContent = arr_Mark[tr_Mark][1];
						row.insertCell().textContent = arr_Mark[tr_Mark][2];
						row.insertCell().textContent = arr_Mark[tr_Mark][3];
						row.insertCell().textContent = "0";
						row.insertCell().textContent = "Mark";
						row.insertCell().textContent = "0";
						row.insertCell().textContent = "0";
						if (hasInsertOrderData) {
							row.insertCell().textContent = "0";
						}
					}
				}
				let ref_PartUnit = arr_PartReportUnit[0].indexOf("BoardRef");
				let sumCad = 0;
				for (let tr_PartUnit = 1; tr_PartUnit < arr_PartReportUnit.length; tr_PartUnit++) {
					let boardRefKey = arr_PartReportUnit[tr_PartUnit][ref_PartUnit];
					let board = vlookup(boardRefKey, arr_Place, 0);
					let ref = vlookup(boardRefKey, arr_Place, 1);
					let posX = vlookup(boardRefKey, arr_Place, 2);
					let posY = vlookup(boardRefKey, arr_Place, 3);
					let rotation = vlookup(boardRefKey, arr_Place, 4);
					let partNumber = vlookup(boardRefKey, arr_Place, 5);
					let mounter = arr_PartReportUnit[tr_PartUnit][3];
					let feeder = arr_PartReportUnit[tr_PartUnit][4];
					if (board && ref) {
						sumCad++;
						let row = table.insertRow();
						row.insertCell().textContent = board.trim();
						row.insertCell().textContent = ref.trim();
						row.insertCell().textContent = posX.trim();
						row.insertCell().textContent = posY.trim();
						row.insertCell().textContent = rotation.trim();
						row.insertCell().textContent = partNumber.trim();
						row.insertCell().textContent = "M" + mounter.trim();
						row.insertCell().textContent = "F" + feeder.trim();
						if (hasInsertOrderData) {
							let searchOrder = board.trim() + ":" + ref.trim();
							let holderValue = getHolder(searchOrder, arr_InsertOrder);
							let holderCell = holderValue ? "H" + holderValue.trim() : "";
							row.insertCell().textContent = holderCell;
						}
					}
				}
				document.getElementById("txtExport").innerHTML = "";
				document.getElementById("txtExport").appendChild(table);
			    document.getElementById("total-cad").innerText = sumCad;
			});
			function formatInput_1(elementId) {
				let arr0 = [];
				let arr1 = [];
				let arr2 = [];
				let arr3 = [];
				let inputElement = document.getElementById(elementId);
				let txtInput = inputElement.value.trim().split("\n");
				for (let x = 0; x < txtInput.length; x++) {
					arr0.push([]);
					let cells = txtInput[x].split("\t");
					for (let xx = 0; xx < cells.length; xx++) {
						arr0[x].push(cells[xx].trim());
					}
				}
				if (arr0.length > 0 && arr0[0].length > 0) {
					for (let x = 0; x < arr0[0].length; x++) {
						arr1.push([]);
						arr2.push([]);
						arr3.push([]);
						for (let xx = 0; xx < arr0.length; xx++) {
							let cellValue = arr0[xx][x] || "";
							arr1[x].push(cellValue);
							arr2[x].push(cellValue.length);
						}
						arr3[x].push(Math.max.apply(null, arr2[x]));
						for (let u = 0; u < arr1[x].length; u++) {
							let uLength = arr1[x][u].length;
							let maxLength = arr3[x][0];
							if (uLength < maxLength) {
								for (let k = 0; k < (maxLength - uLength); k++) {
									arr1[x][u] += " ";
								}
							}
						}
					}
					let ee = "";
					for (let x = 0; x < arr1[0].length; x++) {
						for (let xx = 0; xx < arr1.length; xx++) {
							ee += arr1[xx][x];
							if (xx < arr1.length - 1) {
								ee += " | ";
							}
						}
						if (x < arr1[0].length - 1) {
							ee += "\n";
						}
					}
					inputElement.value = ee.trim();
				}
			}
			function vlookup(key, range, col) {
				for (var i = 0; i < range.length; i++) {
					if (range[i].length > 6 && range[i][6] == key) {
						return range[i][col];
					}
				}
				return "";
			}
			function getHolder(searchOrderKey, arr) {
				for (var i = 1; i < arr.length; i++) {
					if (arr[i].length >= 2) {
						var reference = arr[i][0];
						var holder = arr[i][1];
						if (reference === searchOrderKey) {
							return holder;
						}
					}
				}
				return "";
			}
		</script>
	</body>
</html>
