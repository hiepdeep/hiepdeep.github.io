			* {
				font-family: "Quicksand", sans-serif;
				color: red;
				font-size: var(--fz-lv-4);
			}
			body {
				background: var(--bg-body-blue);
				display: grid;
				place-items: center;
				padding: 12px;
			}
			.box {
				width: 100%;
				max-width: 1080px;
				display: flex;
				flex-direction: column;
				gap: 24px;
				.item {
					display: flex;
					flex-direction: column;
					gap: 12px;
					h3 {
						color: var(--color-lv-1);
						font-size: var(--fz-lv-1);
						font-weight: 500;
					}
					ul {
						display: flex;
						flex-direction: column;
						gap: 12px;
						li {
							a {
								display: flex;
								align-items: center;
								gap: 12px;
								padding: 6px;
								background: hsl(var(--hue-saturation-gray), 100%);
								border: 1px solid hsl(var(--hue-saturation-gray), 90%);
								border-radius: var(--bdrs-lv-3);
								&:hover {
									background: hsl(var(--hue-saturation-gray), 95%);
									border-color: hsl(var(--hue-saturation-gray), 85%);
								}
								&:active {
									background: hsl(var(--hue-saturation-gray), 90%);
									border-color: hsl(var(--hue-saturation-gray), 80%);
								}
								img {
									width: 16px;
									height: 16px;
								}
								span {
									font-weight: 500;
									color: hsl(var(--hue-saturation-gray), 30%);
								}
							}
							&.seen {
								a {
									background: hsl(var(--hue-saturation-gray), 90%);
									border-color: hsl(var(--hue-saturation-gray), 80%);
								}
							}
						}
					}
				}
			}
		</style>

			const box = document.getElementById("box");
			notepad.forEach(e => {
				const div = document.createElement("div");
				div.classList.add("item");
				const h3 = document.createElement("h3");
				h3.innerText = e.title;
				div.appendChild(h3);
				const ul = document.createElement("ul");
				e.content.forEach(x => {
					if(!x.url) return;
					const li = document.createElement("li");
					li.innerHTML = `
						<a href="${x.url}" target="_blank">
							<img src="https://www.google.com/s2/favicons?domain=${x.url}">
							<span>${x.title}</span>
						</a>
					`;
					ul.appendChild(li);
					li.addEventListener("click", function(){
						li.classList.add("seen");
					});
				});
				div.appendChild(ul);
				box.appendChild(div);
			});
