<!DOCTYPE html>
<html lang="vn">
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1.0" name="viewport">
		<link rel="icon" href="https://hiepdeep.github.io/library/favicon/logo-light.ico">
		<title>Image Crop</title>
		<link rel="stylesheet" href="https://hiepdeep.github.io/library/style/style.css">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="box">
			<div id="header-top">
				<a href="" class="logo">
					<img src="https://hiepdeep.github.io/library/pictures/picture.png" alt="">
					<span class="text">Image Crop</span>
				</a>
				<div class="btn-gr">
					<button class="material-symbols-rounded" id="btn-dark-more" btn-light-gray>clear_day</button>
				</div>
			</div>
			<div class="main">
				<div class="side side-l">
					<div class="options">
						<div class="change-size">
							<label for="change-w">
								<input id="change-w" type="tel" placeholder="1920" value="1920">
								<span class="label-name">px</span>
							</label>
							<label for="change-h">
								<input id="change-h" type="tel" placeholder="1080" value="1080">
								<span class="label-name">px</span>
							</label>
						</div>
						<div class="change-fill">
							<label for="option-fill">
								<input type="checkbox" name="option-fill" id="option-fill" value="fill" checked>
								<span class="label-name">Fill</span>
							</label>
						</div>
						<div class="change-angle">
							<input type="radio" name="change-angle" id="angle-center-center" value="angle-center-center" checked>
							<input type="radio" name="change-angle" id="angle-top-left" value="angle-top-left">
							<input type="radio" name="change-angle" id="angle-top-center" value="angle-top-center">
							<input type="radio" name="change-angle" id="angle-top-right" value="angle-top-right">
							<input type="radio" name="change-angle" id="angle-center-right" value="angle-center-right">
							<input type="radio" name="change-angle" id="angle-bottom-right" value="angle-bottom-right">
							<input type="radio" name="change-angle" id="angle-bottom-center" value="angle-bottom-center">
							<input type="radio" name="change-angle" id="angle-bottom-left" value="angle-bottom-left">
							<input type="radio" name="change-angle" id="angle-center-left" value="angle-center-left">
						</div>
						<div class="change-filter">
							<label for="filter-blur">
								<span class="label-name">blur <span class="filter-val" id="filter-val-blur" txt-light-gray>0</span></span>
								<input id="filter-blur" type="range" min="0" max="100" value="0">
							</label>
							<label for="filter-brightness">
								<span class="label-name">brightness <span class="filter-val" id="filter-val-brightness" txt-light-gray>100</span></span>
								<input id="filter-brightness" type="range" min="0" max="200" value="100">
							</label>
							<label for="filter-contrast">
								<span class="label-name">contrast <span class="filter-val" id="filter-val-contrast" txt-light-gray>100</span></span>
								<input id="filter-contrast" type="range" min="0" max="200" value="100">
							</label>
							<label for="filter-grayscale">
								<span class="label-name">grayscale <span class="filter-val" id="filter-val-grayscale" txt-light-gray>0</span></span>
								<input id="filter-grayscale" type="range" min="0" max="100" value="0">
							</label>
							<label for="filter-hue-rotate">
								<span class="label-name">hue-rotate <span class="filter-val" id="filter-val-hue-rotate" txt-light-gray>0</span></span>
								<input id="filter-hue-rotate" type="range" min="0" max="360" value="0">
							</label>
							<label for="filter-invert">
								<span class="label-name">invert <span class="filter-val" id="filter-val-invert" txt-light-gray>0</span></span>
								<input id="filter-invert" type="range" min="0" max="100" value="0">
							</label>
							<label for="filter-opacity">
								<span class="label-name">opacity <span class="filter-val" id="filter-val-opacity" txt-light-gray>100</span></span>
								<input id="filter-opacity" type="range" min="0" max="100" value="100">
							</label>
							<label for="filter-saturation">
								<span class="label-name">saturation <span class="filter-val" id="filter-val-saturation" txt-light-gray>1</span></span>
								<input id="filter-saturation" type="range" min="0" max="100" value="1">
							</label>
							<label for="filter-sepia">
								<span class="label-name">sepia <span class="filter-val" id="filter-val-sepia" txt-light-gray>0</span></span>
								<input id="filter-sepia" type="range" min="0" max="100" value="0">
							</label>
						</div>
					</div>
				</div>
				<div class="side side-r">
					<label for="import-image">
						<input type="file" id="import-image" accept="image/*" style="display:none">
						<span class="label-name" btn-blue>Import from library</span>
					</label>
					<label for="paste-image">
						<span class="label-name">or</span>
						<input type="url" id="paste-image" placeholder="Paste link image online here" value="">
					</label>
					<label for="paste-youtube">
						<span class="label-name">or</span>
						<input type="url" id="paste-youtube" placeholder="Paste link video Youtube here" value="">
					</label>
					<div class="preview-picture">
						<h3>Preview:</h3>
						<div id="preview">
							<img src="https://hiepdeep.github.io/library/pictures/yasuo160x90.png" alt="">
							<div id="preview-data-image">
								<span class="data-image">Name: <strong id="data-image-name">yasuo1280x720.png</strong></span>
								<span class="data-image">Type: <strong id="data-image-type">PNG</strong></span>
								<span class="data-image">Dimensions: <strong id="data-image-dimensions">1280x720</strong></span>
								<span class="data-image">Size: <strong id="data-image-size">1883.49KB</strong></span>
							</div>
						</div>
					</div>
					<div class="return-picture">
						<h3>Return:</h3>
						<div id="return">
							<img src="https://hiepdeep.github.io/library/pictures/yasuo1280x720.png" alt="">
						</div>
					</div>
				</div>
			</div>
		</div>
		<script src='https://hiepdeep.github.io/library/script/function/functions.js'></script>
		<script src="script.js"></script>
	</body>
</html>
