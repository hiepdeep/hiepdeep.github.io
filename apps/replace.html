<!DOCTYPE html>
<html lang="vn">
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1.0" name="viewport">
		<link rel="icon" href="https://hiepdeep.github.io/library/favicon/logo-light.ico">
		<title>Replace All</title>
		<link rel="stylesheet" href="https://hiepdeep.github.io/library/style/style.css">
		<style type="text/css">
			* {
				font-family: "Consolas", sans-serif;
				color: red;
				font-size: var(--fz-lv-4);
			}
			body {
				background: var(--bg-body-blue);
				display: grid;
				place-items: center;
				height: 100vh;
			}
			.box {
				display: flex;
				flex-direction: column;
				gap: 12px;
				padding: 12px;
				width: 100%;
				height: 100%;
				.data {
					display: flex;
					gap: 12px;
					textarea {
						resize: none;
						width: 100%;
						line-height: 24px;
						padding: 6px 12px;
						color: var(--color-lv-3);
						background: var(--bg-box);
						border: 1px solid var(--bd-box);
						border-radius: var(--bdrs-lv-3);
						&::placeholder {
							color: var(--color-placeholder);
						}
					}
				}
				.in-change {
					flex-shrink: 0;
					align-items: center;
					textarea {
						field-sizing: content;
						min-height: 24px;
					}
					button {
						flex-shrink: 0;
						width: 30px;
						height: 30px;
						border-radius: var(--bdrs-lv-3);
					}
				}
				.in-textarea {
					height: 100%;
					textarea {
						height: 100%;
					}
				}
			}
		</style>
	</head>
	<body>
		<div class="box">
			<div class="data in-change">
				<textarea name="" id="txts-old" placeholder="Aa"></textarea>
				<button class="material-symbols-rounded" onclick="replaceAll()" btn-blue>chevron_forward</button>
				<textarea name="" id="txts-new" placeholder="Aa"></textarea>
			</div>
			<div class="data in-textarea">
				<textarea name="" id="code-old" placeholder="Aa"></textarea>
				<textarea name="" id="code-new" placeholder="Aa"></textarea>
			</div>
		</div>
		<script>
			console.clear();
			function replaceAll() {
				const txts_old = document.getElementById("txts-old").value;
				const txts_new = document.getElementById("txts-new").value;
				const code_old = document.getElementById("code-old").value;
				document.getElementById("code-new").value = code_old.replaceAll(txts_old, txts_new);
			}
		</script>
	</body>
</html>
