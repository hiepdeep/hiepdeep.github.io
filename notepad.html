<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="favicon.png">
		<title>Notepad</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/hiepdeep/cdn/style.min.css">
		<style type="text/css">
			body {
				background: #010A13;
			}
		</style>
	</head>
	<body>
		<div id="notepad"></div>
		<script type="text/javascript">
			var url = [
				{
					"title": "CSS clip-path maker",
					"link": "http://bennettfeely.com/clippy"
				},
				{
					"title": "Icons - Material Design",
					"link": "https://material.io/resources/icons/?style=baseline"
				}
			]

			var e = "";
			for (i = 0; i < url.length; i++) {
				e += "<p>";
					e += "<a href='" + url[i].link + "' target='_blank'>" + url[i].title + "</a>";
				e += "</p>";
			}

			document.getElementById("notepad").innerHTML = e;
		</script>
	</body>
</html>
