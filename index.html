		<style type="text/css">
			body {
				background: rgba(22, 24, 36, 0.9);
				font-family: "Be Vietnam Pro", sans-serif;
				letter-spacing: 0.04em;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
			}

			.container {
				display: flex;
				gap: 12px;
				--shadow: 0px 10px 20px -10px rgb(255, 255, 255, 5%);
			}

			.container:before {
				content: "";
				position: absolute;
				background: url("/cdn/pictures/1920w/F3Ri9hXx.png");
				background-position: center;
				background-repeat: no-repeat;
				background-size: cover;
				width: 100%;
				height: 100%;
				top: 0;
				left: 0;
				opacity: 0.5;
				z-index: -1;
			}

			.container .colLeft {
				width: 320px;
				flex-shrink: 0;
				background: #161824;
				border-radius: 4px;
				box-shadow: var(--shadow);
			}

			.container .colLeft .nav>li>a {
				color: rgba(255, 255, 255, 0.5);
				height: 42px;
				font-size: 15px;
				font-weight: 500;
				transition: 0.25s;
				display: flex;
				align-items: center;
			}

			.container .colLeft .nav>li>a:hover {
				color: white;
			}

			.container .colLeft .nav>li>a:hover span:after {
				height: 24px;
			}

			.container .colLeft .nav>li>a span {
				margin-right: 12px;
				font-size: 24px;
				padding: 4px;
				position: relative;
				width: 42px;
				height: 42px;
				display: flex;
				justify-content: center;
				align-items: center;
			}

			.container .colLeft .nav>li>a span:after {
				content: "";
				position: absolute;
				background: #5890FF;
				width: 2px;
				height: 12px;
				right: -1px;
				top: 50%;
				transform: translateY(-50%);
				transition: 0.25s;
			}

			.container .colLeft .nav>li ul {
				margin-left: 42px;
			}

			.container .colLeft .nav>li ul li a {
				color: rgba(255, 255, 255, 0.5);
				height: 42px;
				font-size: 15px;
				font-weight: 500;
				transition: 0.25s;
				display: flex;
				align-items: center;
				padding: 0 12px;
				position: relative;
			}

			.container .colLeft .nav>li ul li a:before {
				content: "";
				position: absolute;
				background: #FE8884;
				width: 2px;
				height: 12px;
				left: -1px;
				top: 50%;
				transform: translateY(-50%);
				transition: 0.25s;
			}

			.container .colLeft .nav>li ul li a:hover {
				color: white;
			}

			.container .colLeft .nav>li ul li a:hover:before {
				height: 24px;
			}

			.container .colRight .favicon {
				width: 540px;
				border-radius: 4px;
				overflow: hidden;
				user-select: none;
				box-shadow: var(--shadow);
			}

			.container .colRight .mediaSocial {
				margin-top: 12px;
				display: flex;
				gap: 12px;
				justify-content: space-between;
			}

			.container .colRight .mediaSocial:hover a {
				opacity: 0.25;
			}

			.container .colRight .mediaSocial a {
				width: 100%;
				height: calc(80px * 9/16);
				display: flex;
				justify-content: center;
				align-items: center;
				border-radius: 4px;
				color: #FFF;
				font-size: 14px;
				transition: 0.25s;
				background: var(--bg_ic);
				transition: 0.25s;
				box-shadow: var(--shadow);
			}

			.container .colRight .mediaSocial a:hover {
				opacity: 1;
			}
		</style>

	<body>

					<li>

						<ul>

					</li>

					<li><a href=""><span class="material-icons">flag_circle</span> Contact</a></li>
					<li><a href=""><span class="material-icons">help</span> Support</a></li>
				</div>
			</div>
			<div class="colRight">
				<div class="favicon">

				<div class="mediaSocial">
					<a target="_blank" href="https://www.facebook.com/hiepdeep" style="--bg_ic: linear-gradient(0deg, #0062e0 0%, #19afff 100%);">
						<span class="fab fa-facebook-f"></span>
					</a>
					<a target="_blank" href="https://www.instagram.com/hiepdeep" style="--bg_ic: linear-gradient(45deg, #ffd600 0%, #ff0100 50%, #d800b9 100%);">
						<span class="fab fa-instagram"></span>
					</a>
					<a target="_blank" href="https://twitter.com/hiepdeep" style="--bg_ic: #55acee;">
						<span class="fab fa-twitter"></span>
					</a>
					<a target="_blank" href="https://twitter.com/hiepdeep" style="--bg_ic: #772ce8;">
						<span class="fab fa-twitch"></span>
					</a>
					<a target="_blank" href="https://www.youtube.com/c/hiepdeep" style="--bg_ic: #ff0000;">
						<span class="fab fa-youtube"></span>
					</a>
					<a target="_blank" href="https://www.tiktok.com/@hiepdeep" style="--bg_ic: linear-gradient(135deg, #08fff9 0%, #f00044 100%);">
						<span class="fab fa-tiktok"></span>

					<a target="_blank" href="https://codepen.io/hiepdeep" style="--bg_ic: #212121;">
						<span class="fab fa-codepen"></span>
					</a>
				</div>
			</div>
