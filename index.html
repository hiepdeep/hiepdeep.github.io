		<style type="text/css">
			body {
				background: var(--light);
				font-family: "Be Vietnam Pro", sans-serif;
				letter-spacing: 0.04em;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				padding: 12px;
				overflow: hidden;
			}

			.card {
				background: url("/cdn/pictures/background/clem-onojeghuo-cBX2AWbzizY-unsplash.jpg");
				background-position: center;
				background-size: cover;
				width: 1280px;
				height: 720px;
				box-shadow: rgba(0, 0, 0, 0.25) 0px 25px 50px -12px;
				position: relative;
			}

			.card:before {
				content: "";
				position: absolute;
				width: 100vw;
				height: 100vh;
				background: inherit;
				z-index: -1;
				filter: blur(25px);
				opacity: 0.75;
				left: 50%;
				top: 50%;
				transform: translate(-50%, -50%) scale(1.2);
			}

			.card .header {
				background: rgba(0, 0, 0, 0.25);
				width: 100%;
				border-bottom: 3px solid rgba(0, 0, 0, 0.5);
				backdrop-filter: blur(10px);
			}

			.card .header .row {
				display: flex;
				justify-content: space-between;
				height: 48px;
				padding: 0 12px;
			}

			.card .header .row .favicon {
				height: calc(48px - 24px);
				margin-top: 12px;
				box-shadow: 0 0.5rem 1rem 0 rgba(0, 0, 0, 0.1);
			}

			.card .header .row nav {
				display: flex;
				gap: 12px;
			}

			.card .header .row nav>li a {
				line-height: 48px;
				display: block;
				color: rgba(255, 255, 255, 0.75);
				font-size: 14px;
				font-weight: 500;
			}

			.card .header .row nav>li a:hover {
				color: #20B2AA;
			}

			.card .header .row nav>li ul {
				visibility: hidden;
				opacity: 0;
				position: absolute;
				top: calc(100% + 3px);
				right: 0;
				background: linear-gradient(180deg, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0) 100%);
				width: calc(254px + 24px);
				height: 200px;
				padding: 12px;
				transition: 0.25s;
			}

			.card .header .row nav>li ul:before {
				content: "";
				position: absolute;
				background: transparent;
				width: 100%;
				height: 3px;
				left: 0;
				bottom: 100%;
			}

			.card .header .row nav>li:hover ul {
				visibility: visible;
				opacity: 1;
				background: linear-gradient(180deg, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0) 100%);
				height: 618px;
			}

			.card .welcome {
				background: rgba(0, 0, 0, 0.25);
				width: 100%;
				height: calc(100% - 51px - 51px);
				display: flex;
				justify-content: center;
				align-items: center;
				flex-direction: column;
				font-weight: 600;
			}

			.card .welcome a {
				color: rgba(255, 255, 255, 0.75);
				font-size: 42px;
				text-transform: uppercase;
			}

			.card .welcome span {
				color: rgba(255, 255, 255, 0.75);
				font-size: 24px;
			}

			.card .footer {
				background: rgba(0, 0, 0, 0.25);
				width: 100%;
				height: 51px;
				border-top: 3px solid rgba(0, 0, 0, 0.5);
				position: relative;
				backdrop-filter: blur(10px);
			}

			.card .footer:before {
				position: absolute;
				background: #FF3677;
				width: 48px;
				height: 48px;
				right: 12px;
				bottom: calc(100% + 15px);
				box-shadow: 0 0.5rem 1rem 0 rgba(0, 0, 0, 0.1);
				border-radius: 4px;
			}

			.card .footer .mediaSocial {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 12px;
				padding: 0 12px;
				height: 100%;
			}

			.card .footer .mediaSocial a {
				width: 24px;
				height: 24px;
				display: flex;
				justify-content: center;
				align-items: center;
				border-radius: 4px;
				box-shadow: 0 0 0px 2px rgba(255, 255, 255, 0.25);
				color: #FFF;
				font-size: 12px;
				transition: 0.25s;
			}

			.card .footer .mediaSocial a:hover {
				background: var(--bg_ic);
				box-shadow: 0 0 20px 0px rgba(255, 255, 255, 0.25);
			}
		</style>
	</head>
	<body>

							</ul>
						</li>
						<li><a href="">About</a></li>

					</nav>
				</div>
			</div>
			<div class="welcome">

			</div>
			<div class="footer">
				<div class="mediaSocial">
					<a target="_blank" href="https://www.facebook.com/hiepdeep" style="--bg_ic: linear-gradient(0deg, #0062e0 0%, #19afff 100%);">
						<span class="fab fa-facebook-f"></span>
					</a>
					<a target="_blank" href="https://www.instagram.com/hiepdeep" style="--bg_ic: linear-gradient(45deg, #ffd600 0%, #ff0100 50%, #d800b9 100%);">
						<span class="fab fa-instagram"></span>
					</a>
					<a target="_blank" href="https://twitter.com/hiepdeep" style="--bg_ic: #55acee;">
						<span class="fab fa-twitter"></span>
					</a>
					<a target="_blank" href="https://www.youtube.com/c/hiepdeep" style="--bg_ic: #ff0000;">

					<a target="_blank" href="https://www.tiktok.com/@hiepdeep" style="--bg_ic: linear-gradient(135deg, #08fff9 0%, #f00044 100%);">
