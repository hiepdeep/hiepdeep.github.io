<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="/cdn/favicon/favicon.svg">
		<title>HiepDeep | New Year 2023</title>
		<meta name="title" content="HiepDeep | New Year 2023">
		<meta name="description" content="Lorem Ipsum is simply dummy text of the printing and typesetting industry">
		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://hiepdeep.github.io">
		<meta property="og:title" content="HiepDeep | Sense and Simplicity">
		<meta property="og:description" content="Lorem Ipsum is simply dummy text of the printing and typesetting industry">
		<meta property="og:image" content="/cdn/pictures/meta/countdown2023.png">
		<!-- Twitter -->
		<meta property="twitter:card" content="summary_large_image">
		<meta property="twitter:url" content="https://hiepdeep.github.io">
		<meta property="twitter:title" content="HiepDeep | Sense and Simplicity">
		<meta property="twitter:description" content="Lorem Ipsum is simply dummy text of the printing and typesetting industry">
		<meta property="twitter:image" content="/cdn/pictures/meta/countdown2023.png">
		<link rel="stylesheet" href="/cdn/style.css">
		<style type="text/css">
			body {
				background-image: url("https://hiepdeep.github.io/cdn/pictures/background/firework-display-singapore.jpg");
				font-family: "Be Vietnam Pro", sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				background-position: center;
				background-repeat: no-repeat;
				background-size: cover;
				letter-spacing: 0.04em;
			}
			body:before {
				content: "";
				position: absolute;
				background: rgba(0, 0, 0, 0.5);
				width: 100%;
				height: 100%;
			}
			.countdown {
				background: linear-gradient(135deg, rgba(106, 175, 230, 0.5) 20%, rgba(210, 113, 190, 0.5) 80%);
				width: 1280px;
				height: 720px;
				overflow: hidden;
				position: relative;
				z-index: 9;
				box-shadow: 0 5px 30px -10px rgba(0, 0, 0, 0.9);
				padding: 48px;
				border-radius: 24px;
				display: flex;
				justify-content: space-between;
				backdrop-filter: blur(2px);
			}
			.countdown .colL {
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				gap: 24px;
			}
			.countdown .colL .row {
				display: flex;
				flex-direction: column;
				gap: 24px;
			}
			.countdown .colL .row .h2 {
				color: #fff;
				font-size: 72px;
				font-weight: bold;
				display: flex;
				flex-direction: column;
			}
			.countdown .colL .row .h3 {
				color: #fff;
				font-size: 24px;
				opacity: 0.75;
				display: flex;
				flex-direction: column;
				gap: 6px;
			}
			.countdown .colL .row a {
				background: #ff1064;
				width: 120px;
				height: 50px;
				display: block;
				border-radius: 36px;
				display: flex;
				justify-content: center;
				align-items: center;
				color: #fff;
				font-size: 16px;
				font-weight: bold;
				box-shadow: 0 0 30px -10px rgba(0, 0, 0, 0.9);
				border: 2px solid #ddd;
			}
			.countdown .colL .copyright {
				display: flex;
				gap: 24px;
				position: relative;
			}
			.countdown .colL .copyright:before {
				content: "";
				background: rgba(255, 255, 255, 0.2);
				position: absolute;
				width: 2px;
				height: 50%;
				top: 50%;
				transform: translateY(-50%);
				left: 51px;
			}
			.countdown .colL .copyright img {
				width: auto;
				height: 40px;
			}
			.countdown .colR {
				width: 25%;
				display: grid;
				grid-template-columns: auto auto;
				grid-gap: 12px;
			}
			.countdown .colR .t {
				font-family: "consolas";
				background: rgba(255, 48, 48, 0.75);
				display: flex;
				justify-content: center;
				align-items: center;
				font-size: 100px;
				font-weight: bold;
				border: 2px solid rgba(255, 255, 255, 0.75);
			}
			.countdown:before, .countdown:after {
				content: "";
				position: absolute;
				background: rgba(255, 255, 0, 0.25);
				width: 1280px;
				height: 1280px;
				right: -38%;
				bottom: -95%;
				border-radius: 40%;
				z-index: -1;
			}
			.countdown:before {
				animation: water 20s linear infinite;
			}

			.countdown:after {
				animation: water 30s linear infinite;
			}
			@keyframes water {
				0% {
					transform: rotate(0deg);
				}

				100% {
					transform: rotate(360deg);
				}
			}
		</style>
	</head>
	<body>
		<div class="countdown">
			<div class="colL">
				<div class="row">
					<div class="h2">
						<span>Countdown</span>
						<span>to New Year 2023</span>
					</div>
					<div class="h3">
						<span>Share witht your friends warm words</span>
						<span>to all the wishes in the new</span>
						<span>year will be granted</span>
					</div>
					<a href="">Share</a>
				</div>
				<div class="copyright">
					<img src="https://hiepdeep.netlify.app/cdn/pictures/Asset17.png" alt="">
					<img src="/cdn/favicon/hiepdeep-b.svg" alt="">
				</div>
			</div>
			<div class="colR"></div>
		</div>
		<script type="text/javascript">
			const colR = document.querySelector('.colR');
			// Đặt ngày đếm
			var countDownDate = new Date("January 22, 2023 0:0:0").getTime();
			// Cập nhật đếm ngược cứ sau 1 giây
			var x = setInterval(function() {
				// Nhận ngày và thời gian
				var now = new Date().getTime();
				// Tìm khoảng cách giữa bây giờ và ngày đếm ngược
				var distance = countDownDate - now;
				// Tính toán thời gian cho ngày, giờ, phút và giây
				var d = Math.floor(distance / (1000 * 60 * 60 * 24));
				var h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
				var m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
				var s = Math.floor((distance % (1000 * 60)) / 1000);
				d = checkTime(d);
				h = checkTime(h);
				m = checkTime(m);
				s = checkTime(s);
				function checkTime(i) {
					if (i < 10) {
						i = "0" + i;
					}
					return i;
				}
				var time = d + "" + h + "" + m + "" + s;
				var r = "";
				for (let i = 0; i < time.split("").length; i++) {
					r += `<span class="t">${time.split("")[i]}</span>`;
				}
				colR.innerHTML = r;
				if (distance < 0) {
					clearInterval(x);
					document.getElementById("countdown").innerHTML = "Chúc Mừng Năm Mới 2023!";
				}
			});
		</script>
	</body>
</html>
