<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="https://www.youtube.com/s/desktop/9ba58884/img/favicon_96.png">
		<title>YouTube API - Playlist</title>
		<link rel="stylesheet" href="../../cdn/style.css">
		<style type="text/css">
			body {
				background: var(--light);
				font-family: "Google Sans", sans-serif;
				display: flex;
				justify-content: center;
				padding: 1rem;
			}

			.playlist {
				background: #FFF;
				padding: 1rem;
				border-radius: var(--radius);
				box-shadow: var(--shadow-1);
				max-width: 550px;
			}

			.playlist ul {
				display: grid;
				grid-gap: 1rem;
			}

			.playlist ul li {
				display: flex;
			}

			.playlist ul li .thumb {
				flex-shrink: 0;
				display: block;
				width: 160px;
				height: 90px;
				border-radius: var(--radius);
				overflow: hidden;
				box-shadow: var(--shadow-2);
			}

			.playlist ul li .thumb img {
				display: block;
			}

			.playlist ul li .content {
				margin-left: 1rem;
			}

			.playlist ul li .content .title {
				display: -webkit-box;
				-webkit-line-clamp: 1;
				-webkit-box-orient: vertical;
				overflow: hidden;
				color: var(--black-rgb-87);
				line-height: 20px;
				font-size: 14px;
				font-weight: 500;
			}

			.playlist ul li .content .metaData {
				display: flex;
				margin-top: 0.5rem;
				opacity: 0.54;
				user-select: none;
			}

			.playlist ul li .content .metaData>div {
				display: flex;
				align-items: center;
				margin-right: 4px;
			}

			.playlist ul li .content .metaData>div .material-icons {
				background: #E9EBEE;
				display: block;
				width: 28px;
				height: 28px;
				display: flex;
				justify-content: center;
				align-items: center;
				margin-right: 4px;
				font-size: 14px;
				border-radius: var(--radius);
			}

			.playlist ul li .content .metaData>div .total {
				font-size: 12px;
				font-weight: 500;
			}

			.playlist ul li .content .author {
				margin-top: 0.5rem;
				display: block;
				color: var(--black-rgb-54);
				line-height: 20px;
				font-size: 14px;
				font-weight: 500;
			}
		</style>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	</head>
	<body>
		<div class="playlist"></div>
		<script type="text/javascript">
			var MAX = "5";
			var PLAYLIST = "PLvQUnzYRDn2QjwTP7BK1cWXaTQr8SaHto";
			var KEY = "AIzaSyDpLX11iVigH2dZfqTClOgHWiPf4w9Y8hA";
			var url = "https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&fields=items(snippet(publishedAt,title,thumbnails(medium),resourceId(videoId),videoOwnerChannelTitle,videoOwnerChannelId))&maxResults=" + MAX + "&playlistId=" + PLAYLIST + "&key=AIzaSyDpLX11iVigH2dZfqTClOgHWiPf4w9Y8hA";
			$.getJSON(url, function(data) {
				var result = data.items;
				var playlist = "";
				var i;
				for (i = 0; i < result.length; i++) {
					var videoID = result[i].snippet.resourceId.videoId;
					var video = "https://www.googleapis.com/youtube/v3/videos?id=" + videoID + "&fields=items(id,snippet,statistics)&part=snippet,statistics&key=AIzaSyDpLX11iVigH2dZfqTClOgHWiPf4w9Y8hA";
					$.getJSON(video, function(str){
						var vd = str.items[0];
						playlist += "<li>";
							playlist += "<a href='https://youtu.be/" + vd.id + "' target='_blank' class='thumb'>";
								playlist += "<img src='" + vd.snippet.thumbnails.medium.url + "'>";
							playlist += "</a>";
							playlist += "<div class='content'>";
								playlist += "<a href='https://youtu.be/" + vd.id + "' target='_blank' class='title'>" + vd.snippet.title + "</a>";
								playlist += "<a href='https://www.youtube.com/channel/" + vd.snippet.channelId + "' target='_blank' class='author'>" + vd.snippet.channelTitle + "</a>";
								playlist += "<div class='metaData'>";
									playlist += "<div class='viewCount'>";
										playlist += "<span class='material-icons'>equalizer</span>";
										playlist += "<span class='total'>" + vd.statistics.viewCount + "</span>";
									playlist += "</div>";
									playlist += "<div class='commentCount'>";
										playlist += "<span class='material-icons'>mode_comment</span>";
										playlist += "<span class='total'>" + vd.statistics.commentCount + "</span>";
									playlist += "</div>";
									playlist += "<div class='likeCount'>";
										playlist += "<span class='material-icons'>thumb_up</span>";
										playlist += "<span class='total'>" + vd.statistics.likeCount + "</span>";
									playlist += "</div>";
									playlist += "<div class='dislikeCount'>";
										playlist += "<span class='material-icons'>thumb_down</span>";
										playlist += "<span class='total'>" + vd.statistics.dislikeCount + "</span>";
									playlist += "</div>";
								playlist += "</div>";
							playlist += "</div>";
						playlist += "</li>";
						$(".playlist").html("<ul>" + playlist + "</ul>");
					});
				}
			});
		</script>
	</body>
</html>
