<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="https://www.youtube.com/s/desktop/9ba58884/img/favicon_96.png">
		<title>YouTube API - Playlist</title>
		<link rel="stylesheet" href="../../cdn/style.css">
		<style type="text/css">
			body {
				background: var(--light);
				font-family: "Google Sans", sans-serif;
				display: flex;
				justify-content: center;
				padding: 1rem;
			}

			.playlist {
				background: #FFF;
				padding: 1rem;
				border-radius: var(--radius);
				box-shadow: var(--shadow-1);
				max-width: 500px;
			}

			.playlist ul {
				display: grid;
				grid-gap: 1rem;
			}

			.playlist ul li {
				display: flex;
			}

			.playlist ul li .thumb {
				flex-shrink: 0;
				display: block;
				width: 160px;
				height: 90px;
				border-radius: var(--radius);
				overflow: hidden;
				box-shadow: var(--shadow-2);
			}

			.playlist ul li .thumb img {
				display: block;
			}

			.playlist ul li .metaData {
				width: 100%;
				padding-left: 1rem;
			}

			.playlist ul li .metaData a {
				display: block;
				color: var(--black-rgb-87);
				line-height: 20px;
				font-size: 14px;
				font-weight: 500;
			}

			.playlist ul li .metaData a.title {
				display: -webkit-box;
				-webkit-line-clamp: 2;
				-webkit-box-orient: vertical;
				overflow: hidden;
			}

			.playlist ul li .metaData a.author {
				color: var(--black-rgb-54);
			}
		</style>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	</head>
	<body>
		<div class="playlist"></div>
		<script type="text/javascript">
			var GET = "https://www.googleapis.com/youtube/v3/playlistItems";
			var PART = "snippet";
			var FIELDS = "items(snippet(publishedAt,title,thumbnails(medium),resourceId(videoId),videoOwnerChannelTitle,videoOwnerChannelId))";
			var MAX = "5";
			var PLAYLIST = "PLvQUnzYRDn2RtvXsIE43_-bZoanKwLg5L";
			var KEY = "AIzaSyDpLX11iVigH2dZfqTClOgHWiPf4w9Y8hA";
			var url = GET + "?part=" + PART + "&fields=" + FIELDS + "&maxResults=" + MAX + "&playlistId=" + PLAYLIST + "&key=" + KEY;
			$.getJSON(url, function(data) {
				var result = data.items;
				var playlist = "";
				playlist += "<ul>";
				var i;
				for (i = 0; i < result.length; i++) {
					playlist += "<li>";
						playlist += "<a href='https://youtu.be/" + result[i].snippet.resourceId.videoId + "' target='_blank' class='thumb'>";
							playlist += "<img src='" + result[i].snippet.thumbnails.medium.url + "'>";
						playlist += "</a>";
						playlist += "<div class='metaData'>";
							playlist += "<a href='https://youtu.be/" + result[i].snippet.resourceId.videoId + "' target='_blank' class='title'>" + result[i].snippet.title + "</a>";
							playlist += "<a href='https://www.youtube.com/channel/" + result[i].snippet.videoOwnerChannelId + "' target='_blank' class='author'>" + result[i].snippet.videoOwnerChannelTitle + "</a>";
						playlist += "</div>";
					playlist += "</li>";
				}	
				playlist += "</ul>";
				$(".playlist").html(playlist);
			});
		</script>
	</body>
</html>
