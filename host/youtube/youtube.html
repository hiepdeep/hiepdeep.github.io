<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="https://www.youtube.com/s/desktop/9ba58884/img/favicon_96.png">
		<title>YouTube API</title>
		<link rel="stylesheet" href="../../cdn/style.css">
		<style type="text/css">
			body {
				background: var(--light);
				font-family: "Google Sans", sans-serif;
			}

			.YouTubeAPI {
				display: flex;
				flex-direction: column;
				position: relative;
				max-width: 1036px;
				width: calc(100% - 2rem);
				margin: 1rem auto;
			}

			.YouTubeAPI .channels-header {
				background: #322E2F;
				height: 300px;
				position: relative;
				margin-bottom: 1rem;
				border-bottom: calc(1rem + 24px) solid transparent;
			}

			.YouTubeAPI .channels-header .channels-user {
				display: flex;
				align-items: center;
				position: absolute;
				bottom: -24px;
				left: 1rem;
				z-index: 2;
			}

			.YouTubeAPI .channels-header .channels-user .channels-avatar {
				width: 100px;
				height: 100px;
				margin-right: 1rem;
				.border-radius: 50%;
				overflow: hidden;
				border: 4px solid #FFF;
			}

			.YouTubeAPI .channels-header .channels-user .channels-avatar img {
				display: block;
			}

			.YouTubeAPI .channels-header .channels-user .channels-name {
				line-height: 20px;
			}

			.YouTubeAPI .channels-header .channels-user .channels-name h1.name {
				color: #FFF;
				font-size: 18px;
				font-weight: 500;
			}

			.YouTubeAPI .channels-header .channels-user .channels-name h3.username {
				color: #FFF;
				font-size: 12px;
				font-weight: 400;
				font-style: italic;
			}

			.YouTubeAPI .channels-header .channels-header-nav {
				background: #FFF;
				position: absolute;
				top: 100%;
				left: 0;
				width: 100%;
				height: calc(1rem + 24px);
				z-index: 1;
			}

			.YouTubeAPI .main-wrapper {
				display: flex;
			}

			.YouTubeAPI .main-wrapper #leftCol {
				width: 300px;
				flex-shrink: 0;
			}

			.YouTubeAPI .main-wrapper #leftCol .statistics {
				background: #FFF;
				padding: 1rem;
				color: var(--black-rgb-54);
				display: grid;
				grid-gap: 1rem;
			}

			.YouTubeAPI .main-wrapper #leftCol .statistics>div {
				display: flex;
				align-items: center;
			}

			.YouTubeAPI .main-wrapper #leftCol .statistics>div .material-icons {
				background: #E9EBEE;
				display: block;
				width: 40px;
				height: 40px;
				display: flex;
				justify-content: center;
				align-items: center;
				margin-right: 1rem;
				font-size: 20px;
				border-radius: 35% 65% 65% 35%/65% 45% 55% 35%;
			}

			.YouTubeAPI .main-wrapper #leftCol .statistics>div .total {
				font-size: 14px;
				font-weight: 500;
			}

			.YouTubeAPI .main-wrapper #contentCol {
				flex-shrink: 1;
				width: 100%;
				margin-left: 1rem;
				background: #FFF;
			}
		</style>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	</head>
	<body>
		<div class='YouTubeAPI'></div>
		<script type="text/javascript">
			var channelId = "UCyV9xgnGA-Ztrqx_bD9B5ag";
			var KEY = "AIzaSyDmi5gTRgaMaWTZkf2YNhxxNWPT4CQOBeE";
			var getChannels = "https://youtube.googleapis.com/youtube/v3/channels?part=snippet,statistics,brandingSettings&id=" + channelId + "&key=" + KEY;
			$.getJSON(getChannels, function(channels) {
				var channels = channels.items[0];
				var e = "";
				e += "<div class='channels-header'>";
					e += "<div class='channels-user'>";
						e += "<div class='channels-avatar'><img src='" + channels.snippet.thumbnails.medium.url + "'></div>";
						e += "<div class='channels-name'>";
							e += "<h1 class='name'>" + channels.snippet.title + "</h1>";
							e += "<h3 class='username'>@" + channels.snippet.customUrl + "</h3>";
						e += "</div>";
					e += "</div>";
					e += "<div class='channels-header-nav'></div>";
				e += "</div>";
				e += "<div class='main-wrapper'>";
					e += "<div id='leftCol'>";
						e += "<div class='statistics'>";
							e += "<div class='item-'>";
								e += "<span class='material-icons'>subscriptions</span><span class='total'>" + channels.statistics.subscriberCount + " lượt đăng ký</span>";
							e += "</div>";
							e += "<div class='item-'>";
								e += "<span class='material-icons'>equalizer</span><span class='total'>" + channels.statistics.viewCount + " lượt lượt xem</span>";
							e += "</div>";
							e += "<div class='item-'>";
								e += "<span class='material-icons'>playlist_play</span><span class='total'>" + channels.statistics.videoCount + " video</span>";
							e += "</div>";
							e += "<div class='item-'>";
								e += "<span class='material-icons'>query_builder</span>";
								var cl_D = channels.snippet.publishedAt.substr(8, 2);
								var cl_M = channels.snippet.publishedAt.substr(5, 2);
								var cl_Y = channels.snippet.publishedAt.substr(0, 4);
								e += "<span class='total'>" + cl_D + " thg " + cl_M + ", " + cl_Y + "</span>";
							e += "</div>";
						e += "</div>";
					e += "</div>";
					e += "<div id='contentCol'>";
						var getPlaylist = "https://www.googleapis.com/youtube/v3/search?part=id,snippet&channelId=" + channelId + "&order=date&maxResults=9&key=" + KEY;
						e += getPlaylist;
					e += "</div>";
				e += "</div>";
				$(".YouTubeAPI").html(e);
			});
		</script>
	</body>
</html>
