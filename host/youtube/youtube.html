<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="https://www.youtube.com/s/desktop/9ba58884/img/favicon_96.png">
		<title>YouTube API</title>
		<link rel="stylesheet" href="../../cdn/style.css">
		<style type="text/css">
			body {
				background: var(--light);
				font-family: "Google Sans", sans-serif;
				display: flex;
				justify-content: center;
				padding: 1rem;
			}

			.YoutubeAPI {
				width: 100%;
				max-width: 1036px;
			}

			.YoutubeAPI .header {
				background: var(--dark);
				width: 100%;
				height: 300px;
				position: relative;
				border-bottom: 3rem solid #FFF;
				user-select: none;
				background-image: url("pictures/banner.jpg");
				background-position: center;
				background-repeat: center;
				background-size: cover;
			}

			.YoutubeAPI .header .userData {
				display: flex;
				align-items: flex-end;
				position: absolute;
				left: calc(1rem - 4px);
				bottom: -2rem;
			}

			.YoutubeAPI .header .userData .thumb {
				flex-shrink: 0;
				width: 92px;
				height: 92px;
				background: #000;
				border: 4px solid #FFF;
			}

			.YoutubeAPI .header .userData .nameData {
				margin-left: 0.5rem;
			}

			.YoutubeAPI .header .userData .nameData a {
				display: block;
				font-size: 15px;
				font-weight: 700;
				line-height: 2rem;
			}

			.YoutubeAPI .header .userData .nameData .fullname {
				color: #FFF;
			}

			.YoutubeAPI .header .userData .nameData .username {
				color: var(--black-rgb-38);
			}

			.YoutubeAPI .main-wrapper {
				display: flex;
				justify-content: space-between;
				margin: 1rem 0 0;
			}

			.YoutubeAPI .main-wrapper .colLeft {
				flex-shrink: 0;
				width: 300px;
				margin-right: 1rem;
				background: #FFF;
			}

			.YoutubeAPI .main-wrapper .colLeft .statistics {
				background: #FFF;
				padding: 1rem;
				display: grid;
				grid-gap: 1rem;
				user-select: none;
			}

			.YoutubeAPI .main-wrapper .colLeft .statistics>div {
				display: flex;
				align-items: center;
			}

			.YoutubeAPI .main-wrapper .colLeft .statistics>div .material-icons {
				color: var(--black-rgb-38);
				background: var(--light);
				display: block;
				width: 48px;
				height: 48px;
				font-size: 24px;
				display: flex;
				justify-content: center;
				align-items: center;
				margin-right: 1rem;
			}

			.YoutubeAPI .main-wrapper .colLeft .statistics>div .total {
				color: var(--black-rgb-54);
				font-size: 14px;
				font-weight: 700;
			}

			.YoutubeAPI .main-wrapper .colRight {
				width: 100%;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist {
				display: grid;
				grid-template-columns: repeat(auto-fit, minmax(296px, 1fr));
				grid-gap: 1rem;
				width: 100%;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video {
				background: #FFF;
				transition: 0.25s;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video:hover {
				box-shadow: var(--shadow-1);
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .thumb {
				display: block;
				overflow: hidden;
				position: relative;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .thumb img {
				transform: scale(1.05);
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .thumb .rating {
				position: absolute;
				width: 100%;
				height: 4px;
				background: red;
				bottom: 0;
				--sum: calc(var(--likeCount) + var(--dislikeCount));
				--rating: calc(100% * var(--likeCount) / var(--sum));
				background-image: linear-gradient(90deg, #F00 var(--rating), var(--light) 0);
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data {
				padding: 1rem;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .title {
				color: var(--black-rgb-87);
				font-size: 14px;
				font-weight: 700;
				line-height: 20px;
				display: -webkit-box;
				-webkit-line-clamp: 1;
				-webkit-box-orient: vertical;
				overflow: hidden;
				margin-bottom: 0.5rem;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .statistics {
				display: flex;
				justify-content: space-between;
				align-items: center;
				user-select: none;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .statistics .item- {
				display: flex;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .statistics .item- .item {
				margin-right: 0.5rem;
				background: var(--light);
				display: flex;
				align-items: center;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .statistics .item- .item:first-child .material-icons {
				background: var(--blue);
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .statistics .item- .item:last-child .material-icons {
				background: var(--green);
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .statistics .item- .item .material-icons {
				display: block;
				width: 24px;
				height: 24px;
				font-size: 15px;
				display: flex;
				justify-content: center;
				align-items: center;
				color: #FFF;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .statistics .item- .item .total {
				color: var(--black-rgb-54);
				padding: 0 0.5rem;
				font-size: 14px;
				font-weight: 500;
			}

			.YoutubeAPI .main-wrapper .colRight .playlist .video .data .statistics .date {
				color: var(--black-rgb-54);
				font-size: 14px;
				font-weight: 500;
			}
		</style>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
	</head>
	<body>
		<div class="YoutubeAPI"></div>
		<script type="text/javascript">
			var channelID = "UCyV9xgnGA-Ztrqx_bD9B5ag";
			var keyAPI = "AIzaSyDmi5gTRgaMaWTZkf2YNhxxNWPT4CQOBeE";
			$.getJSON("https://youtube.googleapis.com/youtube/v3/channels?part=snippet,statistics", {id: channelID, key: keyAPI}, function(data) {
				var results = data.items[0];
				var channels = "";
				channels += "<div class='header'>";
					channels += "<div class='userData'>";
						channels += "<a class='thumb' href='https://www.youtube.com/channel/" + results.id + "' target='_blank'><img src='" + results.snippet.thumbnails.high.url + "'></a>";
						channels += "<div class='nameData'>";
							channels += "<a class='fullname' href='https://www.youtube.com/channel/" + results.id + "' target='_blank'>" + results.snippet.title + "</a>";
							channels += "<a class='username' href='https://www.youtube.com/channel/" + results.id + "' target='_blank'>" + results.snippet.customUrl + "</a>";
						channels += "</div>";
					channels += "</div>";
				channels += "</div>";
				channels += "<div class='main-wrapper'>";
					channels += "<div class='colLeft'>";
						channels += "<div class='statistics'>";
							channels += "<div class='item-'>";
								channels += "<span class='material-icons'>subscriptions</span><span class='total'>" + results.statistics.subscriberCount + " lượt đăng ký</span>";
							channels += "</div>";
							channels += "<div class='item-'>";
								function viewCount() {
									var num = results.statistics.viewCount;
									var res = num.split("");
									switch (res.length) {
										case 4:
										case 5:
										case 6:
											comma = num.replace(/(\d+)(\d{1})(\d{2})/, "$2");
											if (comma <= 0) {
												return num.replace(/(\d+)(\d{1})(\d{2})/, "$1 N");
											}
											else {
												return num.replace(/(\d+)(\d{1})(\d{2})/, "$1,$2 N");
											}
											break;
										case 7:
										case 8:
										case 9:
											comma = num.replace(/(\d+)(\d{1})(\d{5})/, "$2");
											if (comma <= 0) {
												return num.replace(/(\d+)(\d{1})(\d{5})/, "$1 Tr");
											}
											else {
												return num.replace(/(\d+)(\d{1})(\d{5})/, "$1,$2 Tr");
											}
											break;
										case 10:
										case 11:
										case 12:
											comma = num.replace(/(\d+)(\d{1})(\d{8})/, "$2");
											if (comma <= 0) {
												return num.replace(/(\d+)(\d{1})(\d{8})/, "$1 T");
											}
											else {
												return num.replace(/(\d+)(\d{1})(\d{8})/, "$1,$2 T");
											}
									}
								}
								channels += "<span class='material-icons'>equalizer</span><span class='total'>" + viewCount() + " lượt xem</span>";
							channels += "</div>";
							channels += "<div class='item-'>";
								channels += "<span class='material-icons'>playlist_play</span><span class='total'>" + results.statistics.videoCount + " video</span>";
							channels += "</div>";
							channels += "<div class='item-'>";
								var cl_D = results.snippet.publishedAt.substr(8, 2);
								var cl_M = results.snippet.publishedAt.substr(5, 2);
								var cl_Y = results.snippet.publishedAt.substr(0, 4);
								channels += "<span class='material-icons'>query_builder</span><span class='total'>" + cl_D + " thg " + cl_M + ", " + cl_Y + "</span>";
							channels += "</div>";
						channels += "</div>";
					channels += "</div>";
					channels += "<div class='colRight'>";
						channels += "<div class='playlist'></div>";
					channels += "</div>";
				channels += "</div>";
				$(".YoutubeAPI").html(channels);
			});
			function getVIDEO(channelID, keyAPI) {
				$.getJSON("https://www.googleapis.com/youtube/v3/search?part=id,snippet&order=date&maxResults=20", {channelId: channelID, key: keyAPI}, function(data) {
				var results = data.items;
				var e = "";
				var i;
				for (i = 0; i < results.length; i++) {
					if (results[i].id.kind == "youtube#video") {
						var videoID = results[i].id.videoId;
						var getVIDEO = "https://www.googleapis.com/youtube/v3/videos?id=" + videoID + "&part=snippet,statistics&key=" + keyAPI;
						$.getJSON(getVIDEO, function(video) {
							var video = video.items[0];
							e += "<div class='video'>";
								e += "<a class='thumb' href='https://youtu.be/" + video.id + "' target='_blank'>";
									e += "<img src='https://i.ytimg.com/vi/" + video.id + "/maxresdefault.jpg'>";
									e += "<div class='rating' style='--likeCount: " + video.statistics.likeCount + "; --dislikeCount: " + video.statistics.dislikeCount + "'></div>";
								e += "</a>";
								e += "<div class='data'>";
									e += "<a href='https://youtu.be/" + video.id + "' class='title' target='_blank'>" + video.snippet.title + "</a>";
									e += "<div class='statistics'>";
										function viewCount() {
											var num = video.statistics.viewCount;
											var res = num.split("");
											switch (res.length) {
												case 4:
												case 5:
												case 6:
													comma = num.replace(/(\d+)(\d{1})(\d{2})/, "$2");
													if (comma <= 0) {
														return num.replace(/(\d+)(\d{1})(\d{2})/, "$1 N");
													}
													else {
														return num.replace(/(\d+)(\d{1})(\d{2})/, "$1,$2 N");
													}
													break;
												case 7:
												case 8:
												case 9:
													comma = num.replace(/(\d+)(\d{1})(\d{5})/, "$2");
													if (comma <= 0) {
														return num.replace(/(\d+)(\d{1})(\d{5})/, "$1 Tr");
													}
													else {
														return num.replace(/(\d+)(\d{1})(\d{5})/, "$1,$2 Tr");
													}
													break;
												case 10:
												case 11:
												case 12:
													comma = num.replace(/(\d+)(\d{1})(\d{8})/, "$2");
													if (comma <= 0) {
														return num.replace(/(\d+)(\d{1})(\d{8})/, "$1 T");
													}
													else {
														return num.replace(/(\d+)(\d{1})(\d{8})/, "$1,$2 T");
													}
											}
										}
										e += "<div class='item-'>";
											e += "<div class='item'>";
												e += "<span class='material-icons'>equalizer</span><div class='total'>" + viewCount() + "</div>";
											e += "</div>";
											e += "<div class='item'>";
												e += "<span class='material-icons'>mode_comment</span><div class='total'>" + video.statistics.commentCount + "</div>";
											e += "</div>";
										e += "</div>";
										var video_D = video.snippet.publishedAt.substr(8, 2);
										var video_M = video.snippet.publishedAt.substr(5, 2);
										var video_Y = video.snippet.publishedAt.substr(0, 4);
										e += "<div class='date'>" + video_D + " thg " + video_M + ", " + video_Y + "</div>";
									e += "</div>";
								e += "</div>";
							e += "</div>";
							$(".YoutubeAPI .main-wrapper .colRight .playlist").html(e);
						});
					}
				}
			});
			}
			getVIDEO(channelID, keyAPI);
		</script>
	</body>
</html>
