<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
		<meta content="width=device-width, initial-scale=1" name="viewport">
		<link rel="icon" href="/favicon.png">
		<title>HiepDeep - Trang Chủ</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/ngovanhiep/css/css.min.css">
		<link rel="stylesheet" href="style.css">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
		<style type="text/css">
			:root {
				--body-background: #E9EBEE;
				--dark: #322E2F;
				--blue: #5890FF;
				--pink: #FF3677;
				--green: #1CC88A;
			}
			html {
				scroll-behavior: smooth;
			}
			body {
				background: var(--body-background);
				font-family: "Google Sans", sans-serif;
			}
			.container .mainContainer .colRight {
				width: 100%;
				height: calc(100vh - 50px - 2rem);
				border-radius: var(--border);
				display: flex;
				justify-content: center;
				align-items: center;
				opacity: 0.38;
				border: 2px dashed #000;
				color: #000;
				font-weight: 500;
				user-select: none;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<header>
				<div class="row">
					<div class="header-left">
						<div class="logo">
							<a href="">
								<img src="../logo.svg">
							</a>
						</div>
						<div class="search">
							<input type="text" placeholder="Tìm kiếm...">
							<span class="material-icons">search</span>
						</div>
					</div>
					<div class="header-right">
						<h2 class="member-name">
							<img src="https://hiepdeep.github.io/pictures/users/javierr.jpg">
						</h2>
					</div>
				</div>
			</header>
			<div class="mainContainer">
				<div class="colLeft">colLeft</div>
				<div class="colRight">colRight</div>
			</div>
			<footer>
				<div class="footer-left">
					<div id="copyright">© 2020 <a href="">HiepDeep</a> - All Rights Reserved</div>
				</div>
				<div class="footer-right">footer-right</div>
			</footer>
		</div>
	</body>
</html>
